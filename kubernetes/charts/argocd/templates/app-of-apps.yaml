---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: app-of-apps
  namespace: argocd
spec:
  ignoreApplicationDifferences:
    - jsonPointers:
        - /spec/syncPolicy
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: {{ required "argocd.apps.repoURL is required" .Values.apps.repoURL }}
        revision: HEAD
        {{- if .Values.apps.watchedDirs }}
        directories:
          {{- toYaml .Values.apps.watchedDirs | nindent 10 }}
        {{- else }}
        {{- fail "argocd.apps.watchedDirs is required" }}
        {{- end }}
        values:
          syncWave: '{{ "{{" }} index (splitList "-" (index .path.segments 2)) 0 {{ "}}" }}'
          project: '{{ "{{" }} index (splitList "-" (index .path.segments 2)) 1 {{ "}}" }}'
  template:
    metadata:
      name: {{`"{{.path.basename}}"`}}
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: {{`"{{.values.syncWave}}"`}}
        {{- if .Values.apps.annotations }}
        {{- toYaml .Values.apps.annotations | nindent 8 }}
        {{- end }}
    spec:
      project: {{`"{{.values.project}}"`}}
      source:
        repoURL: {{ required "argocd.apps.repoURL is required" .Values.apps.repoURL }}
        targetRevision: HEAD
        path: {{`"{{.path.path}}"`}}
        plugin: {}
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      {{- with .Values.apps.syncPolicy }}
      syncPolicy:
        {{- toYaml . | nindent 8 }}
      {{- end }}
