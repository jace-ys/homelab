resources:
  argocd-routes: |
    apiVersion: gateway.networking.k8s.io/v1
    kind: ReferenceGrant
    metadata:
      name: argocd-routes
      namespace: {{ .Release.Namespace }}
    spec:
      from:
        - group: gateway.networking.k8s.io
          kind: HTTPRoute
          namespace: kgateway-system
        - group: gateway.networking.k8s.io
          kind: GRPCRoute
          namespace: kgateway-system
      to:
        - group: ""
          kind: Service
