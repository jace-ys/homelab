resources:
  cloudflare-dns01-secret: |
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: cloudflare-dns01
      namespace: {{ .Release.Namespace }}
    spec:
      secretStoreRef:
        kind: ClusterSecretStore
        name: oci-vault
      target:
        deletionPolicy: Delete
      data:
        - secretKey: api-token
          remoteRef:
            key: cloudflare-api-token
            conversionStrategy: Default
            decodingStrategy: None
            metadataPolicy: None
            nullBytePolicy: Ignore

  selfsigned-cluster-issuer: |
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: selfsigned
    spec:
      selfSigned: {}

  letsencrypt-cluster-issuer: |
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt
    spec:
      acme:
        email: jaceys.tan@gmail.com
        server: https://acme-v02.api.letsencrypt.org/directory
        privateKeySecretRef:
          name: letsencrypt-private-key
        solvers:
          - dns01:
              cloudflare:
                apiTokenSecretRef:
                  name: cloudflare-dns01
                  key: api-token

  letsencrypt-staging-cluster-issuer: |
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-staging
    spec:
      acme:
        email: jaceys.tan@gmail.com
        server: https://acme-staging-v02.api.letsencrypt.org/directory
        privateKeySecretRef:
          name: letsencrypt-staging-private-key
        solvers:
          - dns01:
              cloudflare:
                apiTokenSecretRef:
                  name: cloudflare
                  key: api-token
