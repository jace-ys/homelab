global:
  priorityClassName: system-cluster-critical

resources:
  limits:
    memory: 128Mi
  requests:
    cpu: 20m
    memory: 128Mi

livenessProbe:
  enabled: true
readinessProbe:
  enabled: true

webhook:
  certManager:
    enabled: true
    cert:
      issuerRef:
        group: cert-manager.io
        kind: ClusterIssuer
        name: selfsigned

  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 20m
      memory: 128Mi

  livenessProbe:
    enabled: true
  readinessProbe:
    enabled: true

certController:
  create: false
