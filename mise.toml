[tools]
age = "1.3.1"
oci = "3.81.1"
opentofu = "1.12.0"
sops = "3.13.1"
spacectl = "1.21.5"

[env]
SOPS_AGE_KEY = { required = true }
SPACELIFT_API_KEY_SECRET = { required = true }

[env._]
file = ".env"

[tasks."tofu:fmt"]
run = "tofu fmt -recursive terraform"

[tasks."tofu:init"]
usage = '''
flag "--upgrade"
'''
run = '''
for dir in $(find terraform -type f -name '*.tf' -exec dirname {} \; | sort -u); do
  tofu -chdir="$dir" init {% if usage.upgrade %} -upgrade {% endif %}
done
'''

[tasks."spacelift:init"]
dir = "terraform/spacelift/init"
run = "tofu"

[tasks.mkcell]
usage = '''
arg "<dir>"
'''
run = '''
mkdir -p "{{ usage.dir }}"
jq -n '{spacelift:{managed:true}}' > "{{ usage.dir }}/cell.json"
'''
