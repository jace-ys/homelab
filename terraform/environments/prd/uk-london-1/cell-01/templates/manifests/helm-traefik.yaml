---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    instanceLabelOverride: traefik

    providers:
      kubernetesIngress:
        publishedService:
          enabled: false

    additionalArguments:
      - "--providers.kubernetesingress.ingressendpoint.ip=${lb_internal_ip}"

    service:
      type: NodePort
      externalTrafficPolicy: Cluster

    ports:
      web:
        nodePort: 30080
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
              permanent: true
      websecure:
        nodePort: 30443

    ingressRoute:
      dashboard:
        enabled: true
        entryPoints: ["websecure"]
        matchRule: Host(`traefik.${base_domain_internal}`)
        tls:
          certResolver: letsencrypt

    api:
      dashboard: true
      insecure: false

    logs:
      general:
        format: "json"

    persistence:
      enabled: true

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 64Mi

    env:
      - name: CF_DNS_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: traefik
            key: cloudflare-api-token

    certificatesResolvers:
      letsencrypt:
        acme:
          email: ${cloudflare_email}
          caServer: https://acme-v02.api.letsencrypt.org/directory
          storage: /data/acme.json
          dnsChallenge:
            provider: cloudflare
            resolvers:
              - "1.1.1.1:53"
              - "1.0.0.1:53"
---
apiVersion: v1
kind: Secret
metadata:
  name: traefik
  namespace: kube-system
type: Opaque
stringData:
  cloudflare-api-token: ${cloudflare_api_token}
